<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>플레이리스트 만들기 — MusicPlz</title>
  <link rel="stylesheet" href="create.css">
</head>
<body>

  <div class="noise-layer"></div>

  <nav>

      </svg>
    </a>
    <div class="nav-right">
      <span class="draft-label">새 플레이리스트</span>
    </div>
  </nav>

  <main class="create-wrap">

    <!-- ─── 검색 헤더 ─── -->
    <section class="search-hero">
      <p class="tagline">AI Music Search</p>
      <h1>어떤 곡을 <span class="gradient-text">찾고 있나요?</span></h1>
      <p class="description">제목이 가물가물해도, 가수 이름을 다 기억 못 해도 괜찮아요. 떠오르는 느낌 그대로 적어보세요.</p>

      <div class="search-bar" id="searchBar">
        <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="21" y1="21" x2="16.2" y2="16.2"></line>
        </svg>
        <input
          type="text"
          id="searchInput"
          placeholder="예: 비 오는 날 창밖 보며 듣던 잔잔한 노래"
          autocomplete="off"
        >
        <button type="button" class="search-clear" id="searchClear" hidden aria-label="검색어 지우기">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
        <button type="button" class="search-submit" id="searchSubmit">
          <svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </button>
      </div>

      <div class="ai-chip-row" id="aiChipRow" hidden>
        <div class="ai-chip">
          <span class="ai-chip-dot"></span>
          <span id="aiInterpretation">이런 느낌으로 찾고 있어요</span>
        </div>
      </div>

      <div class="suggest-row" id="suggestRow">
        <span class="suggest-label">이런 검색도 가능해요</span>
        <button type="button" class="suggest-pill" data-q="이별하고 새벽에 듣는 노래">이별하고 새벽에 듣는 노래</button>
        <button type="button" class="suggest-pill" data-q="제목에 별이 들어간 노래">제목에 별이 들어간 노래</button>
        <button type="button" class="suggest-pill" data-q="신나는 운동할 때 듣는 노래">신나는 운동할 때 듣는 노래</button>
      </div>
    </section>

    <!-- ─── 결과 영역 ─── -->
    <section class="results-area">
      <div class="results-state" id="emptyState">
        <div class="empty-icon">🎧</div>
        <p>검색창에 떠오르는 느낌을 적어보세요.<br>AI가 의미를 이해해서 곡을 찾아드려요.</p>
      </div>

      <div class="results-state" id="loadingState" hidden>
        <div class="loading-rows">
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
        </div>
      </div>

      <div class="results-header" id="resultsHeader" hidden>
        <button type="button" class="results-back-btn" id="resultsBackBtn" hidden>← 검색으로 돌아가기</button>
        <span id="resultsCount">12개의 결과</span>
      </div>
      <div class="results-grid" id="resultsGrid" hidden></div>
      <div class="results-load-more" id="resultsLoadMore" hidden>
        <button type="button" class="load-more-btn" id="loadMoreBtn">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          나머지 곡 더 보기
        </button>
      </div>
    </section>

  </main>

  <!-- ─── 하단 고정 바: 선택된 곡 ─── -->
  <div class="tray" id="tray">
    <div class="tray-inner">
      <div class="tray-summary">
        <div class="tray-count" id="trayCount">0곡 담김</div>
        <div class="tray-track-strip" id="trayStrip"></div>
      </div>
      <div class="tray-actions">
        <button type="button" class="tray-clear" id="trayClear">전체 비우기</button>
        <button type="button" class="cta-btn purple tray-create" id="trayCreateBtn" disabled>
          플레이리스트 만들기
        </button>
      </div>
    </div>
  </div>

  <!-- ─── 트랙 상세 모달 (카드를 꾹 누르면 표시) ─── -->
  <div class="track-modal-backdrop" id="trackModalBackdrop" hidden>
    <div class="track-modal" id="trackModal" role="dialog" aria-modal="true" aria-labelledby="modalTrackTitle">
      <button type="button" class="track-modal-close" id="trackModalClose" aria-label="닫기">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>

      <!-- 커버 + 좌우 아티스트 다른 앨범 캐러셀 (기본은 숨김, 커버를 꾹 누르면 펼쳐짐) -->
      <div class="track-modal-cover-row" id="modalCoverRow">
        <div class="cover-carousel-track" id="coverCarouselTrack">
          <!-- JS가 현재 커버 + 좌우 다른 앨범 커버들을 채워줍니다 -->
        </div>
        <div class="carousel-hint" id="carouselHint" hidden></div>
      </div>

      <div class="track-modal-title" id="modalTrackTitle"></div>
      <div class="track-modal-artist" id="modalTrackArtist"></div>
      <div class="track-modal-album-row">
        <span class="track-modal-album-label">앨범</span>
        <span class="track-modal-album-name" id="modalTrackAlbum"></span>
      </div>
    </div>
  </div>

  <!-- ─── 담은 곡 목록 모달 (트레이의 +버튼 클릭 시 표시) ─── -->
  <div class="selected-tracks-modal-backdrop" id="selectedTracksModalBackdrop" hidden>
    <div class="selected-tracks-modal" id="selectedTracksModal" role="dialog" aria-modal="true" aria-labelledby="selectedModalTitle">
      <button type="button" class="selected-tracks-modal-close" id="selectedTracksModalClose" aria-label="닫기">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
      <div class="selected-tracks-modal-header">
        <h3 id="selectedModalTitle">담은 곡 목록</h3>
      </div>
      <div class="selected-tracks-modal-list" id="selectedTracksModalList">
        <!-- JS가 선택된 곡 카드를 여기에 렌더링 -->
      </div>
    </div>
  </div>

  <!-- ─── 플레이리스트 만들기 모달 ─── -->
  <div class="playlist-composer-backdrop" id="playlistComposerBackdrop" hidden>
    <div class="playlist-composer" role="dialog" aria-modal="true" aria-labelledby="playlistComposerTitle">
      <button type="button" class="playlist-composer-close" id="playlistComposerClose" aria-label="닫기">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>

      <div class="playlist-composer-header">
        <label class="playlist-cover-picker" for="playlistCoverInput" id="playlistCoverPicker">
          <input type="file" id="playlistCoverInput" accept="image/*" hidden>
          <span class="playlist-cover-empty" id="playlistCoverEmpty">
            <svg viewBox="0 0 24 24"><path d="M4 8h3l2-3h6l2 3h3v11H4z"></path><circle cx="12" cy="13" r="4"></circle></svg>
          </span>
          <img id="playlistCoverPreview" alt="" hidden>
        </label>
        <div class="playlist-title-field">
          <label for="playlistTitleInput">플레이리스트 제목</label>
          <input type="text" id="playlistTitleInput" maxlength="40" placeholder="제목 입력">
          <span class="field-error" id="playlistTitleError"></span>
        </div>
      </div>

      <div class="playlist-composer-list" id="playlistComposerList">
        <!-- JS가 선택된 곡을 여기에 렌더링 -->
      </div>

      <button type="button" class="cta-btn purple playlist-save-btn" id="playlistSaveBtn">완료</button>
    </div>
  </div>

  <!-- 페이지 전환 웨이브 오버레이 (main.js / login.js와 동일 사양, 화면을 덮은 상태로 시작) -->
  <svg class="wave-transition" id="waveTransition" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
    <path id="wavePath" d="M0,100 L0,0 C25,0 75,0 100,0 L100,100 Z"></path>
  </svg>

  <script src="create.js"></script>
</body>
</html>
