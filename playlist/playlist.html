<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>플레이리스트공유 — MusicPlz</title>
  <link rel="stylesheet" href="playlist.css">
</head>
<body>
  <div class="noise-layer"></div>

  <nav>
    <a href="../main/main.html" class="logo">Music<span class="logo-dot">Plz</span></a>
    <a href="../create/create.html" class="nav-create">플레이리스트 만들기</a>
  </nav>

  <main class="share-wrap">
    <section class="share-hero">
      <p class="tagline">Playlist Share</p>
      <h1>플레이리스트공유</h1>
      <p>다른 사용자가 만든 플레이리스트를 둘러보고 저장해보세요.</p>
    </section>

    <section class="toolbar" id="listToolbar">
      <input type="search" id="playlistSearch" placeholder="플리 이름 검색">
      <div class="sort-tabs" role="tablist" aria-label="정렬">
        <button type="button" class="sort-tab is-active" data-sort="latest">날짜순</button>
        <button type="button" class="sort-tab" data-sort="popular">인기순</button>
      </div>
    </section>

    <section class="playlist-grid" id="playlistGrid"></section>
    <section class="empty-state" id="emptyState" hidden>아직 보여줄 플레이리스트가 없습니다.</section>

    <section class="playlist-detail" id="playlistDetail" hidden>
      <button type="button" class="back-btn" id="backToList">← 목록으로</button>
      <div class="detail-head">
        <img id="detailCover" alt="" class="detail-cover">
        <div class="detail-meta">
          <p class="tagline">Shared Playlist</p>
          <h2 id="detailTitle"></h2>
          <p id="detailByline"></p>
          <div class="detail-actions">
            <button type="button" id="likeBtn">좋아요</button>
            <button type="button" id="saveBtn">저장</button>
          </div>
        </div>
      </div>
      <div class="detail-track-list" id="detailTrackList"></div>
    </section>
  </main>

  <script src="playlist.js"></script>
</body>
</html>
